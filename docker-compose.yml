version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-product:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ProductDb
    ports:
      - "5433:5432"

  postgres-order:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=OrderDb
    ports:
      - "5434:5432"

  product-service:
    image: product-service:latest
    build:
      context: .
      dockerfile: src/Services/ProductService/ProductService.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ProductDb=Host=postgres-product;Database=ProductDb;Username=postgres;Password=postgres
      - ConnectionStrings__rabbitmq=amqp://guest:guest@rabbitmq:5672
    ports:
      - "8081:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  order-service:
    image: order-service:latest
    build:
      context: .
      dockerfile: src/Services/OrderService/OrderService.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OrderDb=Host=postgres-order;Database=OrderDb;Username=postgres;Password=postgres
      - ConnectionStrings__rabbitmq=amqp://guest:guest@rabbitmq:5672
    ports:
      - "8082:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  recommendation-service:
    image: recommendation-service:latest
    build:
      context: .
      dockerfile: src/Services/RecommendationService/RecommendationService.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OpenAI__ApiKey=placeholder-key
      - OpenAI__ModelId=gpt-4o-mini
    ports:
      - "8083:8080"