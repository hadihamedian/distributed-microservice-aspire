name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run Product Unit Tests
        run: dotnet test tests/ProductService.UnitTests/ProductService.UnitTests.csproj --no-build -c Release

      - name: Run Order Unit Tests
        run: dotnet test tests/OrderService.UnitTests/OrderService.UnitTests.csproj --no-build -c Release